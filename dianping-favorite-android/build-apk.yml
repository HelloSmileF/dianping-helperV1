# 自动构建 APK — 推送到 GitHub 自动编译
# 进入 Actions 页面 → 点击 "Build APK" → "Run workflow"
# 构建完成后，在运行结果底部 Artifacts 下载 APK
name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: 构建 Debug APK（编译完可直接安装到手机）
        working-directory: dianping-favorite-android
        run: ./gradlew assembleDebug --build-cache --parallel

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DianpingHelper-v1.0-debug
          path: dianping-favorite-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 编译验证 Release（无签名，仅验证编译通过）
        working-directory: dianping-favorite-android
        run: ./gradlew assembleRelease --build-cache --parallel
        continue-on-error: true

      - name: 上传 Release APK（未签名，需签名后方可安装）
        uses: actions/upload-artifact@v4
        with:
          name: DianpingHelper-v1.0-release-unsigned
          path: dianping-favorite-android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
